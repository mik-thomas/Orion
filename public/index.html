<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orion</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        padding: 2rem;
      }
      .env-pill {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .env-pill--staging {
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #f59e0b;
      }
      .env-pill--production {
        background: #dbeafe;
        color: #1e3a8a;
        border: 1px solid #3b82f6;
      }
    </style>
  </head>
  <body>
  <!-- ENV_PILL -->
    <main>
      <h1>Orion</h1>
      <p>Root static server for smoke tests. The React app lives in <code>client/</code>.</p>
    </main>
  </body>
</html>
