default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", "5434") %>
  username: <%= ENV.fetch("POSTGRES_USER", "orion") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "orion") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "orion_development") %>

test:
  <<: *default
  database: orion_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5).to_i + ENV.fetch("DB_POOL_EXTRA", 2).to_i %>
  connect_timeout: 5
  checkout_timeout: 5
  reaping_frequency: 10
  idle_timeout: 300
  prepared_statements: true
  advisory_locks: false
