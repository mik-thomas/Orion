<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-labelledby="orion-logo-title">
  <title id="orion-logo-title">Orion</title>
  <!-- Court seal frame -->
  <circle cx="20" cy="20" r="17.5" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <!-- Orion hunter bow -->
  <path d="M10 16 Q20 30 30 16" stroke="#5694ca" stroke-width="1.25" fill="none" stroke-linecap="round"/>
  <!-- Orion's belt (three stars) -->
  <circle cx="13" cy="22" r="2" fill="#ffffff"/>
  <circle cx="20" cy="20" r="2.5" fill="#ffffff"/>
  <circle cx="27" cy="22" r="2" fill="#ffffff"/>
  <!-- Shoulder stars -->
  <circle cx="11" cy="14" r="1.25" fill="#ffffff" opacity="0.85"/>
  <circle cx="29" cy="14" r="1.25" fill="#ffffff" opacity="0.85"/>
  <!-- Scales of justice (minimal) -->
  <line x1="20" y1="8" x2="20" y2="12" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <line x1="15" y1="12" x2="25" y2="12" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  <path d="M15 12 L13 15 M25 12 L27 15" stroke="#ffffff" stroke-width="0.9" stroke-linecap="round"/>
</svg>
